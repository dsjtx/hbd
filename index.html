<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday Lauret ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }

body {
margin: 0;
height: 100vh;
overflow: hidden;
font-family: 'Poppins', sans-serif;
background:
radial-gradient(circle at top, rgba(255,255,255,0.18), transparent 28%),
linear-gradient(to bottom, #050816 0%, #0b1026 45%, #1a1033 100%);
color: #fff;
}

/* starry background */
.stars, .stars::before, .stars::after {
position: absolute;
top: 0;
left: 0;
width: 2px;
height: 2px;
border-radius: 50%;
background: white;
box-shadow:
12vw 8vh white, 22vw 18vh white, 30vw 6vh white, 42vw 16vh white,
56vw 9vh white, 68vw 20vh white, 78vw 7vh white, 86vw 15vh white,
8vw 32vh white, 18vw 40vh white, 28vw 28vh white, 38vw 36vh white,
50vw 30vh white, 62vw 38vh white, 74vw 27vh white, 90vw 34vh white,
10vw 60vh white, 24vw 54vh white, 34vw 66vh white, 48vw 58vh white,
60vw 70vh white, 72vw 56vh white, 84vw 64vh white, 94vw 52vh white,
6vw 82vh white, 20vw 86vh white, 36vw 78vh white, 52vw 84vh white,
66vw 88vh white, 80vw 80vh white, 92vw 90vh white;
animation: twinkle 3.5s infinite alternate ease-in-out;
}

.stars::before,
.stars::after {
content: "";
box-shadow:
6vw 12vh rgba(255,255,255,0.7), 16vw 24vh rgba(255,255,255,0.7),
26vw 12vh rgba(255,255,255,0.7), 46vw 22vh rgba(255,255,255,0.7),
58vw 14vh rgba(255,255,255,0.7), 70vw 26vh rgba(255,255,255,0.7),
82vw 10vh rgba(255,255,255,0.7), 96vw 22vh rgba(255,255,255,0.7),
14vw 48vh rgba(255,255,255,0.7), 32vw 44vh rgba(255,255,255,0.7),
44vw 52vh rgba(255,255,255,0.7), 66vw 46vh rgba(255,255,255,0.7),
78vw 50vh rgba(255,255,255,0.7), 88vw 44vh rgba(255,255,255,0.7);
animation-duration: 5s;
}

.stars::after {
box-shadow:
4vw 20vh rgba(255,255,255,0.5), 14vw 34vh rgba(255,255,255,0.5),
24vw 46vh rgba(255,255,255,0.5), 40vw 12vh rgba(255,255,255,0.5),
54vw 24vh rgba(255,255,255,0.5), 64vw 12vh rgba(255,255,255,0.5),
76vw 38vh rgba(255,255,255,0.5), 90vw 14vh rgba(255,255,255,0.5),
8vw 72vh rgba(255,255,255,0.5), 22vw 80vh rgba(255,255,255,0.5),
38vw 72vh rgba(255,255,255,0.5), 58vw 78vh rgba(255,255,255,0.5),
74vw 74vh rgba(255,255,255,0.5), 88vw 82vh rgba(255,255,255,0.5);
animation-duration: 6.5s;
}

@keyframes twinkle {
from { opacity: 0.55; transform: scale(1); }
to   { opacity: 1; transform: scale(1.2); }
}

.container {
position: relative;
z-index: 2;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
text-align: center;
padding: 24px;
}

.card {
width: min(700px, 92vw);
padding: 34px 22px 28px;
border-radius: 28px;
background: rgba(8, 12, 30, 0.45);
border: 1px solid rgba(255,255,255,0.12);
box-shadow: 0 20px 60px rgba(0,0,0,0.35);
backdrop-filter: blur(10px);
}

.name {
font-family: 'Great Vibes', cursive;
font-size: clamp(48px, 8vw, 78px);
margin: 0 0 6px;
color: #fff7c9;
text-shadow: 0 0 12px rgba(255, 246, 182, 0.5);
}

.subtitle {
margin: 0 0 22px;
font-size: 18px;
color: rgba(255,255,255,0.9);
}

.cake {
position: relative;
width: 220px;
margin: 0 auto 20px;
}

.layer {
height: 54px;
border-radius: 14px;
margin-bottom: 6px;
box-shadow: inset 0 -8px 0 rgba(0,0,0,0.12);
}

.layer:nth-child(2) { background: linear-gradient(180deg, #ffb3c7, #ff7ea8); }
.layer:nth-child(3) { background: linear-gradient(180deg, #ffd98e, #ffbf56); }
.layer:nth-child(4) { background: linear-gradient(180deg, #fff1a8, #f6dd59); }

.plate {
width: 260px;
height: 18px;
border-radius: 999px;
margin: 8px auto 0;
background: rgba(255,255,255,0.85);
box-shadow: 0 12px 26px rgba(0,0,0,0.2);
}

.candle {
position: absolute;
top: -44px;
left: 50%;
transform: translateX(-50%);
width: 12px;
height: 42px;
border-radius: 4px;
background: repeating-linear-gradient(
180deg,
#ffffff 0 7px,
#ffd1dc 7px 14px
);
box-shadow: 0 0 10px rgba(255,255,255,0.25);
}

.flame {
position: absolute;
top: -20px;
left: 50%;
transform: translateX(-50%);
width: 18px;
height: 24px;
border-radius: 50% 50% 50% 50%;
background: radial-gradient(circle at 50% 35%, #fff9b0 0%, #ffd94d 30%, #ff9f1c 70%, rgba(255,159,28,0.1) 100%);
box-shadow: 0 0 18px rgba(255, 213, 79, 0.9);
animation: flicker 0.16s infinite alternate ease-in-out;
transform-origin: bottom center;
}

@keyframes flicker {
from { transform: translateX(-50%) scale(1) rotate(-2deg); }
to   { transform: translateX(-50%) scale(1.12) rotate(2deg); }
}

.flame.off {
opacity: 0;
transform: translateX(-50%) scale(0);
transition: opacity 0.45s ease, transform 0.45s ease;
}

.hint {
margin-top: 14px;
font-size: 15px;
color: rgba(255,255,255,0.8);
}

.message {
opacity: 0;
transform: translateY(10px);
transition: 1s ease;
margin-top: 18px;
font-size: clamp(20px, 3vw, 28px);
font-weight: 600;
color: #ffffff;
}

.message.show {
opacity: 1;
transform: translateY(0);
}

canvas {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 1;
}

.mic-note {
margin-top: 8px;
font-size: 13px;
color: rgba(255,255,255,0.7);
} </style>

</head>
<body>
  <div class="stars"></div>
  <canvas id="fireworks"></canvas>

  <main class="container">
    <section class="card">
      <h1 class="name">Lauret</h1>
      <p class="subtitle">Happy Birthday, my friend ✨ Make a wish and blow the candle 🎂</p>

```
  <div class="cake" aria-label="Birthday cake">
    <div class="candle">
      <div class="flame" id="flame"></div>
    </div>
    <div class="layer"></div>
    <div class="layer"></div>
    <div class="layer"></div>
    <div class="plate"></div>
  </div>

  <div class="hint">Allow microphone access, then blow gently toward the mic</div>
  <div class="mic-note">After the candle goes out, fireworks will appear ✨</div>

  <div class="message" id="message">Wishing you a beautiful year ahead,</div>
  <div class="message" id="message">Lauret as Amazing Girl with Great Personalities 💫</div>
</section>
```

  </main>

  <script>
    const flame = document.getElementById("flame");
    const message = document.getElementById("message");

    const canvas = document.getElementById("fireworks");
    const ctx = canvas.getContext("2d");

    let fireworksStarted = false;
    let particles = [];
    let fireworkTimer = null;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    function createFirework(x, y) {
      for (let i = 0; i < 70; i++) {
        particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 7,
          vy: (Math.random() - 0.5) * 7,
          life: 70 + Math.random() * 20,
          size: 1.5 + Math.random() * 1.8
        });
      }
    }

    function animateFireworks() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      particles = particles.filter(p => p.life > 0);
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.03;
        p.life -= 1;

        ctx.globalAlpha = Math.max(p.life / 90, 0);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = "#ffffff";
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      requestAnimationFrame(animateFireworks);
    }
    animateFireworks();

    function startFireworks() {
      if (fireworksStarted) return;
      fireworksStarted = true;

      fireworkTimer = setInterval(() => {
        createFirework(
          Math.random() * canvas.width * 0.9 + canvas.width * 0.05,
          Math.random() * canvas.height * 0.45 + canvas.height * 0.08
        );
      }, 550);

      createFirework(canvas.width * 0.5, canvas.height * 0.25);
    }

    function blowCandle() {
      if (flame.classList.contains("off")) return;
      flame.classList.add("off");
      message.classList.add("show");
      startFireworks();
      createFirework(canvas.width * 0.5, canvas.height * 0.3);
      setTimeout(() => createFirework(canvas.width * 0.3, canvas.height * 0.22), 350);
      setTimeout(() => createFirework(canvas.width * 0.7, canvas.height * 0.18), 700);
    }

    async function initMic() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(stream);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 1024;
        source.connect(analyser);

        const data = new Uint8Array(analyser.fftSize);

        function detect() {
          analyser.getByteTimeDomainData(data);
          let sum = 0;
          for (let i = 0; i < data.length; i++) {
            const v = (data[i] - 128) / 128;
            sum += v * v;
          }
          const rms = Math.sqrt(sum / data.length);

          if (rms > 0.08) {
            blowCandle();
          }

          requestAnimationFrame(detect);
        }

        detect();
      } catch (err) {
        message.textContent = "Microphone access was blocked, but the birthday wish is still here for Lauret ✨";
        message.classList.add("show");
      }
    }

    initMic();
  </script>

</body>
</html>
